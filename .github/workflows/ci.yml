name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar lint
        run: ruff check .

      - name: Rodar testes
        run: pytest -q

  terraform-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Terraform
        run: |
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update
          sudo apt install -y terraform

      - name: Verificar versão do Terraform
        run: terraform version

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-ci, terraform-ci]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Build da imagem Docker
        run: docker build -t devops-fase1-demo:${{ github.sha }} .

      - name: Validar imagem gerada
        run: docker image inspect devops-fase1-demo:${{ github.sha }}

      - name: Subir container para smoke test
        run: docker run -d --name app-test -p 5000:5000 devops-fase1-demo:${{ github.sha }}

      - name: Aguardar aplicação iniciar
        run: sleep 5

      - name: Testar endpoint /health
        run: curl --fail http://localhost:5000/health

      - name: Encerrar container
        if: always()
        run: docker rm -f app-test
